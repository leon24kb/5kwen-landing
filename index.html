<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中华五千问 - 经典名著知识问答&集卡游戏合集</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            overscroll-behavior-y: contain;
        }

        body {
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(180deg, #F0F8FA 0%, #E0F0F5 30%, #B8D4E3 70%, #9EC4D8 100%);
            color: #1a1a1a;
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        /* 山峦剪影 */
        body::after {
            content: '';
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: linear-gradient(180deg, transparent 0%, rgba(70,130,180,0.12) 100%);
            clip-path: polygon(0% 100%, 0% 70%, 15% 55%, 30% 70%, 45% 50%, 60% 65%, 75% 45%, 90% 60%, 100% 50%, 100% 100%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            padding: 60px 20px 80px;
            max-width: 900px;
            margin: 0 auto;
        }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 52px;
            color: #2C5F7C;
            margin-bottom: 12px;
            letter-spacing: 8px;
        }

        .subtitle {
            font-size: 16px;
            color: #666;
            letter-spacing: 2px;
        }

        /* 卡片网格 */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .game-card {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 36px 32px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            transition: all 0.3s;
            cursor: pointer;
            border: 2px solid transparent;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 16px 48px rgba(0,0,0,0.15);
            border-color: #2C5F7C;
        }

        .game-card:active {
            transform: translateY(-4px);
        }

        .game-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .game-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 28px;
            color: #2C5F7C;
            margin-bottom: 8px;
        }

        .game-desc {
            font-size: 14px;
            color: #666;
            margin-bottom: 24px;
            line-height: 1.8;
        }

        .game-btn {
            display: inline-block;
            padding: 12px 32px;
            background: linear-gradient(135deg, #B22222, #D4372C);
            color: white;
            border-radius: 24px;
            font-size: 16px;
            font-family: 'Noto Serif SC', serif;
            transition: all 0.3s;
            touch-action: manipulation;
        }

        .game-card:hover .game-btn {
            transform: scale(1.05);
            box-shadow: 0 4px 16px rgba(178,34,34,0.4);
        }

        /* 底部 */
        .footer {
            text-align: center;
            margin-top: 60px;
            padding: 20px;
            color: #999;
            font-size: 13px;
            letter-spacing: 1px;
        }

        /* 移动端适配 */
        @media (max-width: 480px) {
            .container {
                padding: 40px 16px 60px;
            }

            .logo {
                font-size: 40px;
                letter-spacing: 4px;
            }

            .subtitle {
                font-size: 14px;
            }

            .cards {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .game-card {
                padding: 28px 24px;
            }

            .game-icon {
                font-size: 52px;
            }

            .game-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">中华五千问</div>
            <div class="subtitle">经典名著知识问答&集卡游戏合集</div>
        </div>

        <div class="cards">
            <a class="game-card" href="https://shuihu.5kwen.top">
                <div class="game-icon">🎴</div>
                <div class="game-title">水浒趣味卡片</div>
                <div class="game-desc">108位梁山好汉，趣味问答解锁卡牌<br>重温水浒经典故事</div>
                <div class="game-btn">开始游戏</div>
            </a>

            <a class="game-card" href="https://sanguo.5kwen.top">
                <div class="game-icon">⚔️</div>
                <div class="game-title">三国群英传</div>
                <div class="game-desc">三国英雄荟萃，三阶挑战解锁<br>水墨丹青风格体验</div>
                <div class="game-btn">开始游戏</div>
            </a>
        </div>

        <div class="footer">
            © 2025 中华五千问 · 经典名著知识问答&集卡游戏合集
        </div>
    </div>
</body>
</html>
